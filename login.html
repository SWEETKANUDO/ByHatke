<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, sans-serif;
    background:#f4f4f4;
}

nav{
    background:#333;
    padding:15px;
    text-align:center;
}

nav a{
    color:white;
    text-decoration:none;
    margin:0 15px;
    font-size:18px;
}

.login-box{
    width:350px;
    background:white;
    margin:100px auto;
    padding:30px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

.login-box h2{
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:10px;
    margin:10px 0;
}

button{
    width:100%;
    padding:10px;
    background:#333;
    color:white;
    border:none;
    cursor:pointer;
}
</style>

</head>
<body>

<nav>
    <a href="home.html">Home</a>
    <a href="about.html">About</a>
    <a href="login.html">Login</a>
</nav>

<div class="login-box">
    <h2>Login</h2>

    <form>
        <input type="email" placeholder="Enter Email">
        <input type="password" placeholder="Enter Password">
        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
